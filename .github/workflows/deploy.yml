name: Deploy Steve AI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ---------- BACKEND PACKAGE ----------
      - name: Install backend deps
        run: |
          cd backend
          npm ci --omit=dev

      - name: Zip Lambda
        run: |
          cd backend
          zip -r lambda.zip src node_modules package.json

      # ---------- WIDGET BUILD ----------
      - name: Install widget deps
        run: |
          cd widget
          npm install

      - name: Build widget
        run: |
          cd widget
          npm run build

      # ---------- CONFIGURE AWS ----------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # ---------- DEPLOY BACKEND ----------
      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name steve-ai-backend \
            --zip-file fileb://backend/lambda.zip \
            --publish
          aws lambda wait function-updated --function-name steve-ai-backend
          aws lambda update-function-configuration \
            --function-name steve-ai-backend \
            --runtime nodejs22.x
